  <style>
    /* Body & Background */
    body {
      background-color: #1a1a40; /* dark blue */

      text-align: center;
      color: #eeeeff; /* light text for contrast */
      padding: 20px;
    }

    /* Main Title */
    h1 {
      color: #8a2be2; /* violet */
      font-size: 48px;
      margin-bottom: 10px;
    }

    /* Subtitles */
    h2 {
      color: #d580ff; /* soft violet */
      margin-top: 40px;
      margin-bottom: 20px;
    }

    /* Links */
    a {
      display: block;
      margin: 10px auto;
      font-size: 20px;
      color: #00bfff; /* bright blue */
      text-decoration: none;
      width: 200px;
      padding: 8px;
      border-radius: 5px;
      background-color: #2a2a60; /* slightly lighter dark blue */
      transition: 0.3s;
    }

    a:hover {
      color: #ffffff;
      background-color: #8a2be2; /* violet on hover */
    }

    /* Footer / Notes */
    p {
      margin-top: 50px;
      font-size: 14px;
      color: #ccccff;
    }
